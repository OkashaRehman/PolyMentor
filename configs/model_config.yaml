groq:
  provider: "groq"
  default_model: "llama-3.3-70b-versatile"
  api_key_env: "GROQ_API_KEY"
  temperature: 0.25
  max_completion_tokens: 1800

polymentor:
  purpose: "Groq-powered coding tutor chatbot"
  supported_tasks:
    - "teach programming concepts"
    - "write code in multiple languages"
    - "identify likely bugs"
    - "explain fixes step by step"
    - "convert explanations into learning guides"
  supported_languages:
    - python
    - javascript
    - typescript
    - java
    - cpp
    - c
    - csharp
    - go
    - rust
    - php
    - ruby
    - swift
    - kotlin
    - sql
    - html
    - css
